<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stripe Connected | The Art Dept</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="thanks-page">
      <section class="section-band thanks-card">
        <p class="eyebrow">Stripe onboarding</p>
        <h1>The Art Dept</h1>
        <p class="lede" id="stripeReturnText">Saving the connected artist account.</p>
        <a class="primary" href="./#artist-signup">Back to setup</a>
      </section>
    </main>
    <script>
      var params = new URLSearchParams(window.location.search);
      var account = params.get('account');
      if (account) {
        window.localStorage.setItem('theArtDeptConnectedAccountId', account);
        document.getElementById('stripeReturnText').textContent = 'The artist account was saved. Go back and check Stripe status.';
      }
    </script>
  </body>
</html>
